<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Axé Fiscal — Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <link rel="stylesheet" href="style.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
</head>
<body>
  <div class="page">
    <div class="card">
      <div class="logo-area">
        <div class="logo-text">
          <i class="logo-axefiscal" aria-hidden="true"> <img src="imagem/Rectangle 1.png" alt=""></i>
          <div class="logo-name">
          
          </div>
        </div>
        <p class="logo-sub">Sistema de Gestão Financeira Automatizada</p>
      </div>

      <div class="field">
        <label>Tipo de Acesso</label>
        <div class="custom-select">
          <button class="select-btn" id="selectBtn" type="button" aria-haspopup="listbox" aria-expanded="false">
            <span id="selectLabel">Contador</span>
            <i class="ti ti-chevron-down" aria-hidden="true"></i>
          </button>
          <div class="dropdown-list" id="dropdownList" role="listbox">
            <div class="dropdown-item" data-value="contador" role="option">Contador</div>
            <div class="dropdown-item" data-value="cliente" role="option">Cliente</div>
          </div>
        </div>
      </div>

      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email" />
      </div>

      <div class="field">
        <label for="senha">Senha</label>
        <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password" />
      </div>

      <a href="dashboard/dashboard.html"> <button class="btn-entrar" type="button" >Entrar</button> </a>
      
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
